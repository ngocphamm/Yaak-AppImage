# .github/workflows/build.yml
name: Build Yaak AppImage

on:
  workflow_dispatch:        # manual runs
  schedule:
    - cron: "0 6 * * *"     # daily: pick up new upstream Yaak stable releases
  push:
    branches: [ main ]

permissions:
  contents: write           # needed to publish releases

jobs:
  build:
    name: Build (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64    # add { arch: aarch64 } once Yaak ships an arm64 .deb

    # The pkgforge builder image ships sharun, quick-sharun, get-debloated-pkgs,
    # appimagetool and uruntime on PATH. Confirm the exact image/tag against the
    # TEMPLATE-AppImage you forked from — this is the one thing most likely to
    # differ. (The get-dependencies / make-appimage scripts also self-bootstrap
    # the helpers, so a plain archlinux:latest image will work too.)
    container:
      image: ghcr.io/pkgforge-dev/archlinux:latest
      options: --privileged

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get Yaak + dependencies
        run: |
          chmod +x ./get-dependencies.sh
          ./get-dependencies.sh

      - name: Read resolved version
        id: ver
        run: echo "version=$(cat "$HOME/version")" >> "$GITHUB_OUTPUT"

      # Skip the (expensive) build + release if we've already published this
      # upstream version, so the daily cron doesn't churn releases.
      - name: Check if already released
        id: check
        run: |
          if wget -q --spider \
            "https://github.com/${GITHUB_REPOSITORY}/releases/tag/v${{ steps.ver.outputs.version }}"; then
            echo "exists=true"  >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build AppImage
        if: steps.check.outputs.exists == 'false'
        run: |
          chmod +x ./make-appimage.sh
          ./make-appimage.sh

      - name: Upload build artifact
        if: steps.check.outputs.exists == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: Yaak-AppImage-${{ matrix.arch }}
          path: dist/*

      - name: Publish release
        if: steps.check.outputs.exists == 'false' && github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: Yaak ${{ steps.ver.outputs.version }} (AppImage)
          body: |
            Unofficial, portable AppImage of Yaak ${{ steps.ver.outputs.version }},
            repackaged with sharun so it runs on any Linux distro and ships the
            WebKitGTK Wayland/NVIDIA fixes baked in.

            Not affiliated with or endorsed by the Yaak project.
          files: dist/*
          fail_on_unmatched_files: true
          make_latest: true