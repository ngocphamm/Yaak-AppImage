# .github/workflows/appimage.yml
name: Anylinux-AppImage

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

on:
  schedule:
    - cron: "0 7 */7 * *"   # weekly: check for a new Yaak stable release
  workflow_dispatch:
    inputs:
      force:
        description: "Rebuild even if this Yaak version was already shipped"
        type: boolean
        default: false

jobs:
  # ---------------------------------------------------------------------------
  # Gate: only build when Yaak's current version differs from the last version
  # we successfully shipped. LATEST_VERSION is committed by
  # make-stable-appimage-release *after* a successful publish, so it's a safe
  # "last shipped" marker (a failed build never bumps it). Force overrides.
  # ---------------------------------------------------------------------------
  check:
    name: Check for new Yaak version
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      should_build: ${{ steps.decide.outputs.should_build }}
      version: ${{ steps.decide.outputs.version }}
    steps:
      - name: Decide whether to build
        id: decide
        run: |
          set -eu

          # Latest STABLE Yaak version (excludes pre-releases), strip leading "v".
          VERSION="$(curl -fsSL https://api.github.com/repos/mountain-loop/yaak/releases/latest \
            | grep -Po '"tag_name"\s*:\s*"\K[^"]+' | sed 's/^v//')"
          [ -n "$VERSION" ] || { echo "Could not resolve Yaak version" >&2; exit 1; }
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          # Last version we actually shipped (committed by the release action).
          LAST="$(curl -fsSL "https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/main/LATEST_VERSION" \
            | tr -d '[:space:]' || true)"
          echo "Yaak latest: ${VERSION} | last shipped: ${LAST:-<none>}"

          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            echo "Force requested -> building."
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          elif [ "$VERSION" = "$LAST" ]; then
            echo "Already shipped ${VERSION} -> skipping."
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          else
            echo "New version ${VERSION} (was ${LAST:-none}) -> building."
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: "${{ matrix.name }} (${{ matrix.arch }})"
    needs: [check]
    if: ${{ needs.check.outputs.should_build == 'true' }}
    runs-on: ${{ matrix.runs-on }}
    strategy:
      matrix:
        include:
          - runs-on: ubuntu-latest
            name: Build AppImage
            arch: x86_64
          - runs-on: ubuntu-24.04-arm
            name: Build AppImage
            arch: aarch64
    container: ghcr.io/pkgforge-dev/archlinux:latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      # Provisions the bare Arch container with the full pkgforge toolchain:
      # wget, base-devel, quick-sharun, get-debloated-pkgs, sharun, appimagetool,
      # uruntime, etc.
      - name: Preparing Container
        uses: pkgforge-dev/anylinux-setup-action@0964f2258d6c93d1391359978dde081fd8b3c6af # v2

      - name: Install Dependencies
        run: /bin/sh ./get-dependencies.sh

      - name: Make AppImage
        run: /bin/sh ./make-appimage.sh

      - name: Upload artifact
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: AppImage-${{ matrix.arch }}
          path: dist

  release:
    if: ${{ github.ref_name == 'main' && needs.check.outputs.should_build == 'true' }}
    needs: [check, build]
    permissions: write-all
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          pattern: AppImage-*
          merge-multiple: true

      # Handles tagging + publishing the stable GitHub release (AppImage + zsync),
      # and commits LATEST_VERSION back to the repo with [skip ci].
      - name: Release AppImage
        uses: pkgforge-dev/make-stable-appimage-release@4ed3d48ccb065352b6e6c0db6d39885b201c54a0 # v1.1
